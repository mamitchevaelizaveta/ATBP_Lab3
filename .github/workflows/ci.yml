name: CI/CD Pipeline

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  # ============================================
  # JOB 1: Бэкенд тесты (Java + Spring + Maven)
  # ============================================
  backend-tests:
    name: Backend Tests - Java ${{ matrix.java-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        java-version: [17, 21]
    
    defaults:
      run:
        working-directory: ./Lab3
        shell: bash  # Используем bash на всех ОС
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('Lab3/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      
      - name: Debug - List files
        run: |
          echo "Current directory: $(pwd)"
          echo "Contents:"
          ls -la
          echo "Lab3 contents:"
          ls -la ../Lab3/ || echo "Lab3 not found"
      
      - name: Run Maven tests
        run: mvn clean test
      
      - name: Upload Maven test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-results-${{ matrix.os }}-java${{ matrix.java-version }}
          path: Lab3/target/surefire-reports/

  # ============================================
  # JOB 2: Фронтенд setup
  # ============================================
  frontend-setup:
    name: Frontend Setup
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./atbp-lab5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'atbp-lab5/package-lock.json'
      
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: atbp-lab5/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('atbp-lab5/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-modules-
      
      - name: Install dependencies
        run: npm ci
      
      - name: Debug - Check config
        run: |
          echo "Playwright config exists:"
          cat playwright.config.js | head -20 || echo "Config not found"

  # ============================================
  # JOB 3: UI тесты (Playwright)
  # ============================================
  ui-tests:
    name: UI Tests - ${{ matrix.browser }}
    runs-on: ubuntu-latest
    needs: frontend-setup
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    defaults:
      run:
        working-directory: ./atbp-lab5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'atbp-lab5/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install ${{ matrix.browser }} --with-deps
      
      - name: Debug - List test files
        run: |
          echo "Test directory contents:"
          ls -la src/e2e/tests/ || echo "Test directory not found"
          echo "Playwright config:"
          cat playwright.config.js | grep -A 10 "projects" || echo "Config check failed"
      
      - name: Start Vite dev server
        run: |
          npm run dev &
          npx wait-on http://localhost:5173 --timeout 60000
      
      - name: Run Playwright tests
        run: npx playwright test --project=${{ matrix.browser }}
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            atbp-lab5/test-results/
            atbp-lab5/playwright-report/

  # ============================================
  # JOB 4: API тесты (Cucumber)
  # ============================================
  api-tests:
    name: API Tests (Cucumber)
    runs-on: ubuntu-latest
    needs: backend-tests
    defaults:
      run:
        working-directory: ./Lab3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('Lab3/pom.xml') }}
      
      - name: Start Spring Boot app
        run: |
          mvn spring-boot:run &
          for i in {1..30}; do
            if curl -s http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Server is ready!"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
      
      - name: Run Cucumber tests
        run: mvn test -Dtest="**/CucumberRunner"
      
      - name: Upload Cucumber reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: Lab3/target/cucumber-reports/

  # ============================================
  # JOB 5: Telegram уведомление
  # ============================================
  notify-telegram:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    needs: [backend-tests, api-tests, ui-tests]
    if: always()
    
    steps:
      - name: Check status
        id: status
        run: |
          if [[ "${{ needs.backend-tests.result }}" == "success" ]] && \
             [[ "${{ needs.api-tests.result }}" == "success" ]] && \
             [[ "${{ needs.ui-tests.result }}" == "success" ]]; then
            echo "status=SUCCESS" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "status=FAILED" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi
      
      - name: Send Telegram message
        if: env.TELEGRAM_TOKEN != '' && env.TELEGRAM_TO != ''
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ steps.status.outputs.emoji }} CI/CD Pipeline ${{ steps.status.outputs.status }}
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Author: ${{ github.actor }}
            
            Test Results:
            1. Бэк (Java, Junit + Mockito, Maven): ${{ needs.backend-tests.result }}
            2. API (Java, Cucumber, Maven): ${{ needs.api-tests.result }}
            3. UI (JS, React+Vite, Playwright): ${{ needs.ui-tests.result }}
            
            View details:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
