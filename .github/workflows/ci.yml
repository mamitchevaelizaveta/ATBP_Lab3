name: CI/CD Pipeline

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  # ============================================
  # JOB 1: Бэкенд тесты (Java + Spring + Maven)
  # ============================================
  backend-tests:
    name: Backend Tests - Java ${{ matrix.java-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        java-version: [17]
    
    defaults:
      run:
        working-directory: ./Lab3
        shell: bash
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('Lab3/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      
      - name: Run Maven tests
        run: mvn clean test
      
      - name: Upload Maven test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-results
          path: Lab3/target/surefire-reports/

  # ============================================
  # JOB 2: Фронтенд установка зависимостей
  # ============================================
  frontend-setup:
    name: Frontend Setup
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./atbp-lab5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'atbp-lab5/package-lock.json'
      
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: atbp-lab5/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('atbp-lab5/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-modules-
      
      - name: Install dependencies
        run: npm ci

  # ============================================
  # JOB 3: UI тесты (Playwright) - ПРОСТО npm run test:ui
  # ============================================
  ui-tests:
    name: UI Tests (Playwright)
    runs-on: ubuntu-latest
    needs: frontend-setup
    defaults:
      run:
        working-directory: ./atbp-lab5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'atbp-lab5/package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      
      - name: Start Vite dev server
        run: |
          npm run dev &
          npx wait-on http://localhost:5173 --timeout 60000
      
      - name: Run Playwright tests
        run: npm run test:ui
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            atbp-lab5/test-results/
            atbp-lab5/playwright-report/

  # ============================================
  # JOB 4: API тесты (Cucumber)
  # ============================================
  api-tests:
    name: API Tests (Cucumber)
    runs-on: ubuntu-latest
    needs: backend-tests
    defaults:
      run:
        working-directory: ./Lab3
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('Lab3/pom.xml') }}
      
      - name: Start Spring Boot app
        run: |
          mvn spring-boot:run &
          for i in {1..30}; do
            if curl -s http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Server is ready!"
              break
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
      
      - name: Run Cucumber tests
        run: mvn test -Dtest="**/CucumberRunner"
      
      - name: Upload Cucumber reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: Lab3/target/cucumber-reports/

  # ============================================
  # JOB 5: Telegram уведомление (РАБОЧАЯ ВЕРСИЯ)
  # ============================================
  notify-telegram:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    needs: [backend-tests, api-tests, ui-tests]
    if: always()  # ВАЖНО: отправляем всегда, даже при падении
    
    steps:
      - name: Check status
        id: status
        run: |
          if [[ "${{ needs.backend-tests.result }}" == "success" ]] && \
             [[ "${{ needs.api-tests.result }}" == "success" ]] && \
             [[ "${{ needs.ui-tests.result }}" == "success" ]]; then
            echo "status=✅ SUCCESS" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "status=❌ FAILED" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi
      
      - name: Send Telegram message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ steps.status.outputs.emoji }} CI/CD Pipeline ${{ steps.status.outputs.status }}
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.event.head_commit.message }}
            Author: ${{ github.actor }}
            
            Test Results:
            • Backend (Maven): ${{ needs.backend-tests.result }}
            • API (Cucumber): ${{ needs.api-tests.result }}
            • UI (Playwright): ${{ needs.ui-tests.result }}
            
            View details:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
