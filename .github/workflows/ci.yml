name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # Ручной запуск

env:
  ALLURE_RESULTS_DIR: allure-results

jobs:
  # JOB 1: Бэкенд тесты (Java + Spring + Maven)
  backend-tests:
    name: Backend Tests - Java ${{ matrix.java-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        java-version: [17, 21]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      
      - name: Run Maven tests
        run: mvn clean test
      
      - name: Upload Maven test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maven-test-results-${{ matrix.os }}-java${{ matrix.java-version }}
          path: |
            target/surefire-reports/

  # JOB 2: Фронтенд зависимости
  frontend-setup:
    name: Frontend Setup
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'atbp-lab5/package-lock.json'
      
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: atbp-lab5/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('atbp-lab5/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-modules-
      
      - name: Install dependencies
        working-directory: atbp-lab5
        run: npm ci

  # JOB 3: UI тесты (Playwright)
  ui-tests:
    name: UI Tests - ${{ matrix.browser }}
    runs-on: ubuntu-latest
    needs: frontend-setup
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'atbp-lab5/package-lock.json'
      
      - name: Install dependencies
        working-directory: atbp-lab5
        run: npm ci
      
      - name: Install Playwright browsers
        working-directory: atbp-lab5
        run: npx playwright install ${{ matrix.browser }} --with-deps
      
      - name: Start Vite dev server
        working-directory: atbp-lab5
        run: |
          npm run dev &
          npx wait-on http://localhost:5173 --timeout 60000
      
      - name: Run Playwright tests
        working-directory: atbp-lab5
        run: npx playwright test --project=${{ matrix.browser }}
        continue-on-error: true
      
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            atbp-lab5/test-results/
            atbp-lab5/playwright-report/
            atbp-lab5/screenshots/

  # JOB 4: API тесты (Cucumber + Spring Boot)
  api-tests:
    name: API Tests (Cucumber)
    runs-on: ubuntu-latest
    needs: backend-tests
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
      
      - name: Start Spring Boot app
        run: |
          mvn spring-boot:run &
          npx wait-on http://localhost:8080 --timeout 120000
      
      - name: Run Cucumber API tests
        run: mvn test -Dtest="**/CucumberRunner"
      
      - name: Upload Cucumber reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-reports
          path: |
            target/cucumber-reports/
            target/surefire-reports/

  # JOB 5: Генерация Allure отчета
  allure-report:
    name: Generate Allure Report
    runs-on: ubuntu-latest
    needs: [backend-tests, api-tests, ui-tests]
    if: always()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install Allure
        run: |
          npm install -g allure-commandline
      
      - name: Download all test results
        uses: actions/download-artifact@v4
        with:
          path: all-results
      
      - name: Create Allure results directory
        run: mkdir -p allure-results
      
      - name: Copy JSON results
        run: |
          find all-results -name "*.json" -exec cp {} allure-results/ \; 2>/dev/null || true
          find all-results -name "*.xml" -exec cp {} allure-results/ \; 2>/dev/null || true
      
      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report
      
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
      
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: allure-reports/${{ github.run_number }}
          keep_files: true

  # JOB 6: Telegram уведомление
  notify-telegram:
    name: Send Telegram Notification
    runs-on: ubuntu-latest
    needs: [backend-tests, api-tests, ui-tests, allure-report]
    if: always()
    
    steps:
      - name: Check status
        id: status
        run: |
          if [[ "${{ needs.backend-tests.result }}" == "success" ]] && \
             [[ "${{ needs.api-tests.result }}" == "success" ]] && \
             [[ "${{ needs.ui-tests.result }}" == "success" ]]; then
            echo "status= SUCCESS" >> $GITHUB_OUTPUT
            echo "emoji=✅" >> $GITHUB_OUTPUT
          else
            echo "status= FAILED" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi
      
      - name: Send Telegram message
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ${{ steps.status.outputs.emoji }} CI/CD Pipeline ${{ steps.status.outputs.status }}
            
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.event.head_commit.message }}
            Author: ${{ github.actor }}
            
            Test Results:
            • Backend: ${{ needs.backend-tests.result }}
            • API (Cucumber): ${{ needs.api-tests.result }}
            • UI (Playwright): ${{ needs.ui-tests.result }}
            
            View details:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
            
            Allure Report:
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/allure-reports/${{ github.run_number }}/
