openapi: 3.0.1
info:
  title: Возрастной ценз в кино OpenAPI спецификация
  description: >-
    API для лабораторной работы №3 АТБП
  version: 1.0.1
servers:
  - url: http://localhost:8080
    description: Сервер с бизнес-логикой
tags:
  - name: MovieInfo
    description: API фильмов
  - name: CinemaInfo
    description: API кинотеатра

paths:
  /api/movies/{movieId}:
    get:
      summary: Получить информацию по фильму
      operationId: getMovieById
      tags:
        - MovieInfo
      parameters:
        - name: movieId
          in: path
          required: true
          description: Айди фильма
          schema:
            type: string
            format: int64
      responses:
        '200':
          description: Получен фильм
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/movie'
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/cinema/check-access:
    post:
      summary: Проверить доступ посетителя
      operationId: checkAccess
      tags:
        - CinemaInfo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/viewer'
      responses:
        '200':
          description: Фонд создан
          content:
            application/json:
              schema:
                type: string
        default:
          description: Unexpected error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

# схема АПИ:
components:
  schemas:
    # фильм
    movie:
      type: object
      required:
        - movieId
      properties:
        movieId:
          type: string
          example: 'ttt433'
        movieRating:
          type: integer
          example: '16'
        movieName:
          type: string
          example: Фильм
    # зритель
    viewer:
      type: object
      required:
        - viewerAge
      properties:
        movieId:
          type: string
          example: 'ttt433'
        viewerAge:
          type: integer
          example: '16'
        hasAccompanying:
          type: boolean
    # ошибка
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string